<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ICA PRODUKT — Almacén IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #2d6a2d;
    --verde-vivo: #3d8b3d;
    --verde-dim: #1e4d1e;
    --verde-glow: rgba(45,106,45,0.3);
    --negro: #080c08;
    --gris-oscuro: #0d120d;
    --gris-medio: #141a14;
    --gris-borde: #1e2a1e;
    --gris-texto: #7a8f7a;
    --blanco: #e8f0e8;
    --amarillo: #c8a84b;
    --rojo: #c0392b;
    --azul: #2979FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--negro);
    background-image: radial-gradient(ellipse at 20% 0%, rgba(45,106,45,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(45,106,45,0.05) 0%, transparent 50%);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--gris-oscuro);
    border-bottom: 1px solid var(--gris-borde);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--verde-vivo), transparent);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    height: 32px;
    width: auto;
    filter: brightness(0.9) saturate(0.8);
    opacity: 0.9;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blanco);
    opacity: 0.9;
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    color: var(--gris-texto);
    text-transform: uppercase;
    display: block;
    margin-top: -2px;
  }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--gris-medio); border: 1px solid var(--gris-borde); border-radius: 20px; padding: 4px 12px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.05em; color: var(--gris-texto); cursor: pointer; font-family: 'DM Mono', monospace; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gris-texto); }
  .status-dot.online { background: var(--verde-vivo); box-shadow: 0 0 8px var(--verde-vivo); }
  .status-dot.error { background: var(--rojo); }

  /* TABS */
  .tabs { display: flex; background: var(--gris-oscuro); border-bottom: 1px solid var(--gris-borde); flex-shrink: 0; }
  .tab { flex: 1; padding: 10px; text-align: center; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gris-texto); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.25s; }
  .tab.active { color: var(--verde-vivo); border-bottom-color: var(--verde-vivo); background: rgba(45,106,45,0.05); }
  .tab:hover:not(.active) { color: var(--blanco); }

  /* STATS */
  .stats-bar { background: var(--gris-medio); border-bottom: 1px solid var(--gris-borde); padding: 6px 16px; display: flex; gap: 20px; flex-shrink: 0; overflow-x: auto; }
  .stat { display: flex; flex-direction: column; white-space: nowrap; }
  .stat-label { font-size: 0.6rem; letter-spacing: 0.1em; color: var(--gris-texto); text-transform: uppercase; font-family: 'Syne', sans-serif; }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--verde-vivo); }

  /* PANEL */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* CHAT */
  .chat-container { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .chat-container::-webkit-scrollbar { width: 3px; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; max-width: 88%; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .msg-label { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gris-texto); margin-bottom: 3px; font-family: 'Syne', sans-serif; font-weight: 600; }
  .msg-bubble { padding: 9px 13px; border-radius: 4px; font-size: 0.86rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: var(--verde); color: #000; font-weight: 500; }
  .msg.bot .msg-bubble { background: var(--gris-medio); border: 1px solid var(--gris-borde); }
  .msg.bot .msg-bubble.error { border-color: var(--rojo); color: var(--rojo); }
  .typing-bubble { background: var(--gris-medio); border: 1px solid var(--gris-borde); padding: 10px 14px; border-radius: 4px; display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--verde); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* SUGGESTIONS */
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .suggestion-btn { background: transparent; border: 1px solid var(--gris-borde); color: var(--gris-texto); padding: 5px 10px; border-radius: 3px; font-size: 0.73rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .suggestion-btn:hover { border-color: var(--verde-vivo); color: var(--verde-vivo); }

  /* INPUT */
  .input-area { padding: 10px 14px; background: var(--gris-oscuro); border-top: 1px solid var(--gris-borde); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: var(--gris-medio); border: 1px solid var(--gris-borde); color: var(--blanco); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 9px 12px; border-radius: 4px; resize: none; outline: none; max-height: 100px; min-height: 42px; line-height: 1.4; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--verde); }
  textarea::placeholder { color: var(--gris-texto); }
  .send-btn { background: var(--verde-vivo); border: none; border-radius: 4px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .send-btn:hover { background: var(--verde-dim); }
  .send-btn:disabled { background: var(--gris-borde); cursor: not-allowed; }
  .send-btn svg { fill: #e8f0e8; }

  /* WELCOME */
  .welcome { text-align: center; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .welcome-icon { font-size: 2.2rem; margin-bottom: 2px; }
  .welcome h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 0.05em; }
  .welcome p { font-size: 0.8rem; color: var(--gris-texto); max-width: 260px; line-height: 1.5; }
  .divider { height: 1px; background: var(--gris-borde); margin: 6px 0; width: 100%; }

  /* PLANIFICADOR */
  .planner { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .planner::-webkit-scrollbar { width: 3px; }
  .planner::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }
  .planner-section { background: var(--gris-medio); border: 1px solid var(--gris-borde); border-radius: 4px; padding: 12px; }
  .planner-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--verde); margin-bottom: 10px; }
  .day-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .day-label { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.05em; color: var(--blanco); text-transform: uppercase; }
  .product-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .product-input { background: var(--negro); border: 1px solid var(--gris-borde); color: var(--blanco); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 5px 8px; border-radius: 3px; outline: none; transition: border-color 0.2s; }
  .product-input:focus { border-color: var(--verde); }
  .product-input.wide { flex: 1; min-width: 120px; }
  .product-input.narrow { width: 70px; }
  .add-btn { background: transparent; border: 1px dashed var(--gris-borde); color: var(--gris-texto); padding: 5px 10px; border-radius: 3px; font-size: 0.73rem; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .add-btn:hover { border-color: var(--verde); color: var(--verde); }
  .remove-btn { background: transparent; border: none; color: var(--gris-texto); font-size: 1rem; cursor: pointer; padding: 2px 4px; }
  .remove-btn:hover { color: var(--rojo); }
  .calc-btn { background: var(--verde-vivo); border: none; border-radius: 4px; color: var(--blanco); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.08em; padding: 10px 20px; cursor: pointer; width: 100%; transition: background 0.2s; }
  .calc-btn:hover { background: var(--verde); }
  .calc-btn:disabled { background: var(--gris-borde); cursor: not-allowed; color: var(--gris-texto); }

  /* RESULTADO */
  .result-card { background: var(--negro); border: 1px solid var(--gris-borde); border-radius: 4px; padding: 12px; }
  .result-day { margin-bottom: 14px; }
  .result-day-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--amarillo); letter-spacing: 0.05em; margin-bottom: 6px; text-transform: uppercase; }
  .result-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--gris-borde); font-size: 0.8rem; }
  .result-item:last-child { border-bottom: none; }
  .result-label { color: var(--gris-texto); }
  .result-value { font-weight: 600; color: var(--blanco); }
  .result-value.highlight { color: var(--verde); font-size: 1rem; }
  .result-summary { background: var(--gris-medio); border: 1px solid var(--verde); border-radius: 4px; padding: 10px 12px; margin-top: 10px; }
  .result-summary-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--verde); letter-spacing: 0.08em; margin-bottom: 6px; }
  /* ALERTAS */
  .alertas-bar { background: #1a0a0a; border: 1px solid var(--rojo); border-radius: 4px; padding: 10px 14px; margin: 10px 14px 0; flex-shrink: 0; }
  .alertas-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--rojo); letter-spacing: 0.08em; margin-bottom: 6px; }
  .alerta-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #3a1a1a; font-size: 0.78rem; gap: 8px; }
  .alerta-item:last-child { border-bottom: none; }
  .alerta-pedido { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--rojo); font-size: 0.9rem; white-space: nowrap; }
  .alerta-info { color: var(--gris-texto); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .alerta-transport { color: var(--amarillo); font-size: 0.72rem; white-space: nowrap; }

  .horario-badge { display: inline-block; background: var(--verde); color: #000; font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.9rem; padding: 3px 10px; border-radius: 3px; margin-right: 6px; }
</style>
</head>

const DIAS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];

// ── CHAT ──────────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let historial = [];
let isLoading = false;

async function loadAlertas() {
  try {
    const res = await fetch('/api/alertas');
    const data = await res.json();
    const bar = document.getElementById('alertas-bar');
    const list = document.getElementById('alertas-list');

    if (!data.alertas || data.alertas.length === 0) {
      bar.style.display = 'none';
      return;
    }

    bar.style.display = 'block';
    list.innerHTML = data.alertas.map(a => `
      <div class="alerta-item">
        <span class="alerta-pedido">Ped. ${a.pedido}</span>
        <span class="alerta-info">${a.destino} · ${a.mercancia}</span>
        <span class="alerta-transport">${a.transportista || 'Sin transportista'}</span>
      </div>
    `).join('');

    // Also show in chat as first message
    if (document.getElementById('welcome')) {
      const alertMsg = 'ALERTA: ' + data.alertas.length + ' pedido(s) en la hoja de cargas sin orden de produccion:\n' +
        data.alertas.map(a => '- Pedido ' + a.pedido + ' (' + a.destino + ') - ' + (a.transportista || 'sin transportista')).join('\n');
      addMessage('bot', alertMsg, true);
    }
    // Also fill planner alertas
    const plannerDiv = document.getElementById('alertas-planner');
    const plannerList = document.getElementById('alertas-planner-list');
    if (plannerDiv && plannerList && data.alertas && data.alertas.length > 0) {
      plannerDiv.style.display = 'block';
      plannerList.innerHTML = data.alertas.map(a =>
        '<div style="padding:3px 0;border-bottom:1px solid #3a1a1a">⚠️ Ped. <b style="color:var(--rojo)">' + a.pedido + '</b> — ' + a.destino + ' · ' + (a.transportista || '') + '</div>'
      ).join('');
    }
  } catch(e) {
    console.log('Error cargando alertas:', e);
  }
}

async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.ok) {
      dot.className = 'status-dot online';
      txt.textContent = 'Datos cargados';
      document.getElementById('statsBar').style.display = 'flex';
      document.getElementById('statPedidos').textContent = data.pedidos;
      document.getElementById('statCargas').textContent = data.lineas_carga;
      document.getElementById('statFecha').textContent = data.fecha;
    } else {
      dot.className = 'status-dot error';
      txt.textContent = 'Sin datos';
    }
  } catch(e) {
    dot.className = 'status-dot error';
    txt.textContent = 'Sin conexión';
  }
}

function addMessage(role, content, isError=false) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = role === 'user' ? 'Tú' : 'Asistente';
  const bub = document.createElement('div');
  bub.className = `msg-bubble${isError ? ' error' : ''}`;
  bub.textContent = content;
  msg.appendChild(lbl);
  msg.appendChild(bub);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'msg bot'; w.id = 'typing';
  const lbl = document.createElement('div');
  lbl.className = 'msg-label'; lbl.textContent = 'Asistente';
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  w.appendChild(lbl); w.appendChild(b);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isLoading) return;
  isLoading = true; sendBtn.disabled = true;
  input.value = ''; autoResize(input);
  addMessage('user', text);
  historial.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pregunta: text, historial }) });
    const data = await res.json();
    removeTyping();
    addMessage('bot', data.respuesta || 'Sin respuesta');
    historial.push({ role: 'model', content: data.respuesta });
  } catch(e) {
    removeTyping();
    addMessage('bot', 'Error de conexión. Comprueba que la app está activa.', true);
  }
  isLoading = false; sendBtn.disabled = false; input.focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function useSuggestion(btn) { input.value = btn.textContent; autoResize(input); sendMessage(); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='chat') || (i===1 && tab==='planner')));
  document.getElementById('panel-chat').classList.toggle('active', tab==='chat');
  document.getElementById('panel-planner').classList.toggle('active', tab==='planner');
}

async function cargarDelSheet() {
  const btn = document.getElementById('loadBtn');
  const status = document.getElementById('load-status');
  btn.disabled = true;
  btn.textContent = 'Cargando...';
  status.textContent = '';

  try {
    const res = await fetch('/api/planificacion');
    const data = await res.json();

    if (data.error) {
      status.style.color = 'var(--rojo)';
      status.textContent = 'Error: ' + data.error;
      return;
    }

    const dias = data.dias;
    const fechas = Object.keys(dias).sort();

    if (fechas.length === 0) {
      status.style.color = 'var(--amarillo)';
      status.textContent = 'No hay pedidos con fecha de salida en el Sheet.';
      return;
    }

    // Limpiar contenedor y reconstruir con datos reales
    const container = document.getElementById('days-container');
    container.innerHTML = '';

    // Agrupar fechas proximas (proximos 7 dias)
    const hoy = new Date();
    const en7dias = new Date(hoy); en7dias.setDate(hoy.getDate() + 7);

    let diasMostrados = 0;
    fechas.forEach(fecha => {
      // Intentar parsear la fecha dd/mm/yyyy
      const partes = fecha.split('/');
      let fechaObj = null;
      if (partes.length === 3) {
        fechaObj = new Date(partes[2], partes[1]-1, partes[0]);
      }

      const pedidos = dias[fecha];
      const div = document.createElement('div');
      div.className = 'day-row';

      // Nombre del dia de la semana
      let nombreDia = fecha;
      if (fechaObj) {
        const dias_semana = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
        nombreDia = dias_semana[fechaObj.getDay()] + ' ' + fecha;
      }

      let pedidosHtml = '';
      let totalBultos = 0;
      pedidos.forEach(p => {
        const b = parseInt(p.bultos) || 0;
        totalBultos += b;
        pedidosHtml += `<div class="product-row" style="margin-bottom:4px">
          <input class="product-input wide" type="text" value="${p.producto || ''}" list="productos-list" placeholder="Producto">
          <input class="product-input narrow" type="number" value="${b || ''}" placeholder="Bultos" min="1">
          <span style="font-size:0.65rem;color:var(--gris-texto);white-space:nowrap">Ped.${p.pedido}</span>
          <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
        </div>`;
      });

      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="day-label">${nombreDia}</div>
          <span style="font-size:0.65rem;color:var(--gris-texto)">${pedidos.length} ped · ${totalBultos} bul</span>
        </div>
        <div id="products-fecha-${diasMostrados}">${pedidosHtml}</div>
        <button class="add-btn" onclick="addProductToContainer('products-fecha-${diasMostrados}')">+ Añadir</button>`;

      container.appendChild(div);
      diasMostrados++;
    });

    status.style.color = 'var(--verde)';
    status.textContent = '✓ ' + diasMostrados + ' días cargados del Sheet · ' + Object.values(dias).reduce((s,v) => s+v.length, 0) + ' pedidos';

  } catch(e) {
    status.style.color = 'var(--rojo)';
    status.textContent = 'Error de conexión: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '🔄 CARGAR PEDIDOS DEL SHEET';
}

function addProductToContainer(containerId) {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'product-row';
  row.style.marginBottom = '4px';
  row.innerHTML = `
    <input class="product-input wide" type="text" placeholder="Producto" list="productos-list">
    <input class="product-input narrow" type="number" placeholder="Bultos" min="1">
    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}



function mostrarResultado(resultados, totalBultos, totalHoras) {
  const div = document.getElementById('resultado');
  div.style.display = 'block';
  let html = '<div class="planner-section">';
  html += '<div class="planner-title">📊 Planificación calculada</div>';

  resultados.forEach(r => {
    if (r.vacio) {
      html += `<div class="result-day"><div class="result-day-title">${r.dia}</div><p style="font-size:0.78rem;color:var(--gris-texto)">Sin pedidos</p></div>`;
      return;
    }
    html += `<div class="result-day">`;
    html += `<div class="result-day-title">${r.dia}</div>`;
    html += `<div class="result-card">`;
    html += `<div class="result-item"><span class="result-label">Horario</span><span class="result-value"><span class="horario-badge">${r.horaInicio}</span>→<span class="horario-badge" style="margin-left:6px">${r.horaFin}</span></span></div>`;
    html += `<div class="result-item"><span class="result-label">Personal necesario</span><span class="result-value highlight">${r.personas} personas</span></div>`;
    html += `<div class="result-item"><span class="result-label">Horas totales</span><span class="result-value">${r.horasTotales}h</span></div>`;
    r.productos.forEach(p => {
      html += `<div class="result-item"><span class="result-label">${p.nombre} (${p.bultos} bultos)</span><span class="result-value">${p.mins} min · ${p.personas} pers${p.estimado ? ' *' : ''}</span></div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="result-summary">`;
  html += `<div class="result-summary-title">RESUMEN SEMANAL</div>`;
  html += `<div class="result-item"><span class="result-label">Total bultos semana</span><span class="result-value highlight">${totalBultos.toLocaleString()}</span></div>`;
  html += `<div class="result-item"><span class="result-label">Total horas trabajo</span><span class="result-value">${Math.round(totalHoras * 10) / 10}h</span></div>`;
  html += `<p style="font-size:0.68rem;color:var(--gris-texto);margin-top:8px">* Producto sin histórico. Estimación genérica aplicada.</p>`;
  html += `</div></div>`;

  div.innerHTML = html;
  div.scrollIntoView({ behavior: 'smooth' });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
checkStatus();
loadAlertas();
initPlanner();
setInterval(checkStatus, 5 * 60 * 1000);

// Lista de productos para autocompletar
const dl = document.createElement('datalist');
dl.id = 'productos-list';
Object.keys(ESTANDARES).forEach(p => { const opt = document.createElement('option'); opt.value = p; dl.appendChild(opt); });
document.body.appendChild(dl);
</script>
